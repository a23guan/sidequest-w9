<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GBDA302 Week 9 - Example 3: Adding Sound & Music</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #222;
      }

      /* p5play wraps the canvas in a <main> tag */
      main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: black;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/addons/p5.sound.min.js"></script>
    <script src="https://p5play.org/v3/planck.min.js"></script>
    <script src="https://p5play.org/v3/p5play.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
